server {
    listen 80;
    server_name _;

    # Production deployments should terminate HTTPS in front of this template.
    # If the platform already redirects HTTP to HTTPS, this block can be removed.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    # Replace these placeholders with the actual certificate paths on the host.
    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /opt/bowei_frontend/dist;
    index index.html;

    location = /api/health {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version  1.1;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout   15s;
        client_max_body_size 10m;
    }

    location ^~ /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version  1.1;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout   60s;
        client_max_body_size 10m;
    }

    # Long-lived frontend assets can be cached aggressively.
    location ^~ /assets/ {
        alias /opt/bowei_frontend/dist/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA fallback for React Router history mode.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
